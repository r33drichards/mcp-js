site_name: mcp-v8
site_description: JavaScript MCP server, transports, policies, and operational guidance
site_url: https://r33drichards.github.io/mcp-js/
repo_url: https://github.com/r33drichards/mcp-js
repo_name: r33drichards/mcp-js
edit_uri_template: edit/main/docs/{path}
docs_dir: docs
site_dir: site
theme:
    name: material
plugins:
  - search
nav:
  - Home: index.md
  - Tutorials:
      - Getting Started: tutorials/getting-started.md
  - How-to Guides:
      - Run JavaScript: how-to/run-javascript.md
  - Explanation:
      - Architecture: explanation/architecture.md
  - Reference:
      - API: reference/api.md
markdown_extensions:
  - tables
  - toc:
      permalink: true
extra_css:
    - stylesheets/footer-nav.css
extra_javascript:
    - js/footer-nav.js
