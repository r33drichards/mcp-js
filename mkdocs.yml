site_name: mcp-v8
site_description: JavaScript MCP server, transports, policies, and operational guidance
site_url: https://r33drichards.github.io/mcp-js/
repo_url: https://github.com/r33drichards/mcp-js
repo_name: r33drichards/mcp-js
edit_uri_template: edit/main/site-docs/{path}
docs_dir: site-docs
site_dir: site
theme:
    name: mkdocs
plugins:
  - search
  # The vendored mermaid library is loaded via extra_javascript (below), not
  # the plugin's `javascript:` option. The pinned mkdocs-mermaid2-plugin
  # (v1.1.0) emits the library <script src> using the configured path
  # verbatim, so a relative path like `js/mermaid.min.js` resolves against the
  # current page and 404s on every sub-page (e.g. /concepts/...), leaving
  # diagrams unrendered. Listing the library under extra_javascript lets mkdocs
  # compute the correct per-page URL; the plugin then skips its own injection
  # because the filename contains "mermaid". This is version-independent and
  # also works under newer plugin releases.
  - mermaid2
nav:
  - Home: index.md

  - Install:
      - Overview: install/overview.md
      - Release Script: install/release-script.md
      - Build from Source: install/build-from-source.md
      - Nix: install/nix.md
  - Quick Start:
      - Overview: quick-start/overview.md
      - Claude Code: quick-start/claude-code.md
      - Claude Desktop: quick-start/claude-code-desktop.md
      - Codex: quick-start/codex.md
      - Cursor: quick-start/cursor.md
      - Generic MCP: quick-start/generic-mcp.md
      - curl: quick-start/curl.md
      - Bundled CLI: quick-start/bundled-cli.md
  - How-to:
      - Overview: how-to/overview.md
      - Run with stdio: how-to/run-with-stdio.md
      - Run with HTTP: how-to/run-with-http.md
      - Run with SSE: how-to/run-with-sse.md
      - Use Local Storage: how-to/use-local-storage.md
      - Use S3 Storage: how-to/use-s3-storage.md
      - Run a Cluster: how-to/run-a-cluster.md
      - Enable OPA Policies: how-to/enable-opa-policies.md
      - Provide Sandboxed Filesystem Access: how-to/provide-sandboxed-filesystem-access.md
      - Configure Fetch Header Injection: how-to/configure-fetch-header-injection.md
      - Use SQLite WASM: how-to/use-sqlite-wasm.md
      - Connect as an MCP Server: how-to/connect-as-an-mcp-server.md
      - Use CLI: how-to/use-cli.md
  - Concepts:
      - Overview: concepts/overview.md
      - JavaScript Runtime: concepts/javascript-runtime.md
      - Execution Model: concepts/execution-model.md
      - Sessions and Heaps: concepts/sessions-and-heaps.md
      - Transports: concepts/transports.md
      - Integration Surfaces: concepts/integration-surfaces.md
      - MCP Pass-Through: concepts/mcp-pass-through.md
      - Module Loading: concepts/module-loading.md
      - WASM and Native Modules: concepts/wasm-and-native-modules.md
      - Policy System: concepts/policy-system.md
      - Network Access: concepts/network-access.md
      - Filesystem Access: concepts/filesystem-access.md
      - Clustering: concepts/clustering.md
  - Reference:
      - Overview: reference/overview.md
      - CLI Flags: reference/cli-flags.md
      - HTTP API: reference/http-api.md
      - MCP Tools: reference/mcp-tools.md
      - Policy Files: reference/policy-files.md
markdown_extensions:
  - tables
  - toc:
      permalink: true
extra_css:
    - stylesheets/footer-nav.css
extra_javascript:
    - js/footer-nav.js
    - js/mermaid.min.js
