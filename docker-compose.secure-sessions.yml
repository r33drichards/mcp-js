services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--features=scripts", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/mcp-realm.json:/opt/keycloak/data/import/mcp-realm.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      retries: 15

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr", "0.0.0.0:8181", "/policies"]
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro

  mcp-js:
    build: .
    environment:
      - JWKS_URL=http://keycloak:8080/realms/mcp/protocol/openid-connect/certs
    command:
      - --http-port=3000
      - --directory-path=/data/heaps
      - --session-db-path=/data/sessions
      - --policies-json={"fetch":{"policies":[{"url":"http://opa:8181"}]},"filesystem":{"policies":[{"url":"http://opa:8181"}]}}
      - --fetch-header=host=api.github.com,header=Authorization,value=Bearer ${GITHUB_TOKEN}
      - --secure-sessions
      - --session-claim=session_id
    tmpfs:
      - /data:uid=1000,gid=1000
    ports:
      - "3000:3000"
    depends_on:
      keycloak:
        condition: service_healthy
      opa:
        condition: service_started
