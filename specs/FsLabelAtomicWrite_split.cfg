\* The pre-fix code: head and reflog are two separate replicated writes.
\* Expected TLC result: StableReflogCoversHead is VIOLATED. TLC reports the
\* minimal counterexample:
\*   1. Init                 head=0  reflog={}        phase=idle
\*   2. StartMove            head=1  reflog={}        phase=reflogPending
\*   3. FailReflog           head=1  reflog={}        phase=idle      <-- head=1
\*                           is committed but not in the reflog: fs_reset/GC
\*                           can no longer see how the label reached head=1.
SPECIFICATION Spec
CONSTANT Mode = "split"
CONSTANT MaxMoves = 4
INVARIANT TypeOK
INVARIANT StableReflogCoversHead
