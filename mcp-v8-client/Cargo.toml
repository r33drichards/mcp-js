[package]
name = "mcp-v8-client"
version = "0.1.0"
edition = "2021"
authors = ["r33drichards"]
description = "Auto-generated Rust client for the mcp-v8 HTTP API"
license = "MIT"
repository = "https://github.com/r33drichards/mcp-js"
readme = "README.md"
keywords = ["api-client", "openapi", "mcp", "v8", "javascript"]
categories = ["api-bindings", "web-programming::http-client"]

[[bin]]
name = "mcp-v8-cli"
path = "src/main.rs"

[dependencies]
progenitor-client = "0.8.0"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
tokio = { version = "1", features = ["full"] }
clap = { version = "4.5", features = ["derive", "env"] }

[build-dependencies]
progenitor = "0.8.0"
serde_json = "1.0"
syn = "2.0"
prettyplease = "0.2"
