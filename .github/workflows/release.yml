name: Release Rust Server

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on version tags like v1.2.3

  workflow_dispatch:

permissions:
  contents: write

env:
  # rusty_v8 version must match the deno_core rev in Cargo.toml
  RUSTY_V8_VERSION: "145.0.0"
  # Glibc floor: 2.17 = RHEL7 / CentOS7 era — runs on essentially all modern Linux
  GLIBC_FLOOR: "2.17"

jobs:
  # ── CLI binary builds (mcp-v8-cli) ────────────────────────────────────────
  # Pure HTTP client generated from openapi.json via progenitor.
  # Uses reqwest + rustls-tls — no V8, no OpenSSL dependency.
  # Server portable binaries are dropped; the server is delivered via the Nix flake:
  #   nix run github:r33drichards/mcp-js
  build-cli:
    name: CLI – ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: mcp-v8-cli-linux-x86_64
            use_zigbuild: true
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin_name: mcp-v8-cli-linux-arm64
            use_zigbuild: true
          - name: macOS ARM64
            os: macos-14
            target: aarch64-apple-darwin
            bin_name: mcp-v8-cli-macos-arm64
            use_zigbuild: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install build dependencies (Linux only)
        if: ${{ matrix.use_zigbuild }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm pkg-config perl
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV

      - name: Install Zig + cargo-zigbuild (Linux only)
        if: ${{ matrix.use_zigbuild }}
        run: |
          pip install ziglang --quiet
          cargo install cargo-zigbuild --locked --quiet

      - name: Build CLI – Linux (cargo-zigbuild)
        if: ${{ matrix.use_zigbuild }}
        run: |
          cargo zigbuild --release -p mcp-v8-client \
            --target ${{ matrix.target }}.${{ env.GLIBC_FLOOR }}

      - name: Build CLI – macOS (cargo)
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release -p mcp-v8-client --target ${{ matrix.target }}

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_name }}
          path: target/${{ matrix.target }}/release/mcp-v8-cli

  # ── Server musl static builds (exploratory) ──────────────────────────────
  # Uses gnu-target rusty_v8 prebuilts with musl linker — fully static binaries.
  # continue-on-error: true so failures don't block the release.
  build-server-musl:
    name: Server (musl) – ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true   # exploratory — don't block release
    strategy:
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            rusty_v8_target: x86_64-unknown-linux-gnu
            bin_name: mcp-v8-linux-musl
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            rusty_v8_target: aarch64-unknown-linux-gnu
            bin_name: mcp-v8-linux-arm64-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl + build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            musl-tools clang llvm pkg-config perl
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "OPENSSL_VENDORED=1" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_musl=clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=clang" >> $GITHUB_ENV
      - name: Fetch rusty_v8 static library (gnu target)
        run: |
          URL="https://github.com/denoland/rusty_v8/releases/download/v${RUSTY_V8_VERSION}/librusty_v8_release_${{ matrix.rusty_v8_target }}.a.gz"
          curl -fL "$URL" -o librusty_v8.a.gz
          gunzip librusty_v8.a.gz
          echo "RUSTY_V8_ARCHIVE=$(pwd)/librusty_v8.a" >> $GITHUB_ENV
      - name: Build server (musl)
        run: cargo build --release -p server --target ${{ matrix.target }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_name }}
          path: target/${{ matrix.target }}/release/server

  # ── Publish mcp-v8-client to crates.io ────────────────────────────────────
  publish-crate:
    name: Publish mcp-v8-client to crates.io
    needs: build-cli
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify package
        run: cd mcp-v8-client && cargo package --list

      - name: Publish to crates.io
        run: cd mcp-v8-client && cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

  # ── Assemble GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build-cli, build-server-musl]
    if: always() && needs.build-cli.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename and organize binaries
        run: |
          mkdir -p dist/final

          # CLI binaries (artifact dir name = bin_name, file inside = "mcp-v8-cli")
          for dir in dist/mcp-v8-cli-linux-x86_64 dist/mcp-v8-cli-linux-arm64 dist/mcp-v8-cli-macos-arm64; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            cp "$dir/mcp-v8-cli" "dist/final/$name"
          done

          # Server musl binaries (exploratory — include if present, skip if missing)
          for entry in mcp-v8-linux-musl mcp-v8-linux-arm64-musl; do
            dir="dist/$entry"
            [ -d "$dir" ] || continue
            cp "$dir/server" "dist/final/$entry" || continue
          done

          # Include openapi.json from the repo
          cp mcp-v8-client/openapi.json dist/final/openapi.json

          # Gzip each binary
          for file in dist/final/*; do
            if [ -f "$file" ] && [[ "$file" != *.json ]] && [[ "$file" != *.gz ]]; then
              gzip -c "$file" > "$file.gz"
            fi
          done

          echo "Release assets:"
          ls -lh dist/final/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/final/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
