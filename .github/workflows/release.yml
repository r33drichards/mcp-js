name: Release Rust Server

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on version tags like v1.2.3

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            bin_name: mcp-js-linux-x86_64
          - name: macOS x86_64
            os: macos-13
            bin_name: mcp-js-macos-x86_64
          - name: macOS ARM64
            os: macos-14
            bin_name: mcp-js-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flake-checker-action@main

      - name: Build
        run: nix build .#

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_name }}
          path: result/bin/server

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compress binaries
        run: |
          mkdir -p dist/final
          for dir in dist/*; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              cp "$dir/server" "dist/final/$name"
              gzip -c "dist/final/$name" > "dist/final/$name.gz"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/final/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
