name: Release Rust Server

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on version tags like v1.2.3

  workflow_dispatch:

permissions:
  contents: write

env:
  # rusty_v8 version must match the deno_core rev in Cargo.toml
  RUSTY_V8_VERSION: "145.0.0"
  # Glibc floor: 2.17 = RHEL7 / CentOS7 era — runs on essentially all modern Linux
  GLIBC_FLOOR: "2.17"

jobs:
  # ── Pass 1: CLI binary builds (mcp-v8-cli) ────────────────────────────────
  # Pure HTTP client generated from openapi.json via progenitor.
  # Uses reqwest + rustls-tls — no V8, no OpenSSL dependency.
  build-cli:
    name: CLI – ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: mcp-v8-cli-linux-x86_64
            use_zigbuild: true
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin_name: mcp-v8-cli-linux-arm64
            use_zigbuild: true
          - name: macOS ARM64
            os: macos-14
            target: aarch64-apple-darwin
            bin_name: mcp-v8-cli-macos-arm64
            use_zigbuild: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install build dependencies (Linux only)
        if: ${{ matrix.use_zigbuild }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm pkg-config perl
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV

      - name: Install Zig + cargo-zigbuild (Linux only)
        if: ${{ matrix.use_zigbuild }}
        run: |
          pip install ziglang --quiet
          cargo install cargo-zigbuild --locked --quiet

      - name: Build CLI – Linux (cargo-zigbuild)
        if: ${{ matrix.use_zigbuild }}
        run: |
          cargo zigbuild --release -p mcp-v8-client \
            --target ${{ matrix.target }}.${{ env.GLIBC_FLOOR }}

      - name: Build CLI – macOS (cargo)
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release -p mcp-v8-client --target ${{ matrix.target }}

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_name }}
          path: target/${{ matrix.target }}/release/mcp-v8-cli

  # ── Pass 2: Server binary builds with embedded CLI ────────────────────────
  # Uses cargo-zigbuild for glibc-floored Linux binaries (floor = 2.17).
  # rustls replaces native-tls so there is no OpenSSL to wrangle with zigbuild.
  # macOS uses plain cargo (no glibc concern).
  # Downloads all three CLI artifacts from pass 1 and sets MCP_V8_CLI_* env
  # vars so build.rs embeds them — /api/cli/{platform} serves them directly.
  build-server:
    name: Server – ${{ matrix.name }}
    needs: build-cli
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rusty_v8_target: x86_64-unknown-linux-gnu
            bin_name: mcp-v8-linux
            use_zigbuild: true
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rusty_v8_target: aarch64-unknown-linux-gnu
            bin_name: mcp-v8-linux-arm64
            use_zigbuild: true
          - name: macOS ARM64
            os: macos-14
            target: aarch64-apple-darwin
            rusty_v8_target: aarch64-apple-darwin
            bin_name: mcp-v8-macos-arm64
            use_zigbuild: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install build dependencies (Linux)
        if: ${{ matrix.use_zigbuild }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm pkg-config perl
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV

      - name: Install Zig + cargo-zigbuild (Linux)
        if: ${{ matrix.use_zigbuild }}
        run: |
          pip install ziglang --quiet
          cargo install cargo-zigbuild --locked --quiet

      - name: Install build dependencies (macOS)
        if: ${{ !matrix.use_zigbuild }}
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

      - name: Fetch rusty_v8 static library
        run: |
          URL="https://github.com/denoland/rusty_v8/releases/download/v${RUSTY_V8_VERSION}/librusty_v8_release_${{ matrix.rusty_v8_target }}.a.gz"
          curl -fL "$URL" -o librusty_v8.a.gz && gunzip librusty_v8.a.gz
          echo "RUSTY_V8_ARCHIVE=$(pwd)/librusty_v8.a" >> $GITHUB_ENV

      # Download all three CLI binaries so build.rs can embed them
      - name: Download CLI – Linux x86_64
        uses: actions/download-artifact@v4
        with:
          name: mcp-v8-cli-linux-x86_64
          path: cli-bins/linux-x86_64

      - name: Download CLI – Linux ARM64
        uses: actions/download-artifact@v4
        with:
          name: mcp-v8-cli-linux-arm64
          path: cli-bins/linux-arm64

      - name: Download CLI – macOS ARM64
        uses: actions/download-artifact@v4
        with:
          name: mcp-v8-cli-macos-arm64
          path: cli-bins/macos-arm64

      - name: Set CLI embed paths
        run: |
          chmod +x cli-bins/linux-x86_64/mcp-v8-cli \
                   cli-bins/linux-arm64/mcp-v8-cli \
                   cli-bins/macos-arm64/mcp-v8-cli
          echo "MCP_V8_CLI_LINUX_X86_64=$(pwd)/cli-bins/linux-x86_64/mcp-v8-cli"   >> $GITHUB_ENV
          echo "MCP_V8_CLI_LINUX_AARCH64=$(pwd)/cli-bins/linux-arm64/mcp-v8-cli"   >> $GITHUB_ENV
          echo "MCP_V8_CLI_MACOS_AARCH64=$(pwd)/cli-bins/macos-arm64/mcp-v8-cli"   >> $GITHUB_ENV

      - name: Build server – Linux (cargo-zigbuild, glibc ${{ env.GLIBC_FLOOR }})
        if: ${{ matrix.use_zigbuild }}
        run: |
          cargo zigbuild --release -p server \
            --target ${{ matrix.target }}.${{ env.GLIBC_FLOOR }}

      - name: Build server – macOS (cargo)
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release -p server --target ${{ matrix.target }}

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_name }}
          path: target/${{ matrix.target }}/release/server

  # ── Publish mcp-v8-client to crates.io ────────────────────────────────────
  publish-crate:
    name: Publish mcp-v8-client to crates.io
    needs: build-cli
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify package
        run: cd mcp-v8-client && cargo package --list

      - name: Publish to crates.io
        run: cd mcp-v8-client && cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

  # ── Assemble GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build-cli, build-server]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename and organize binaries
        run: |
          mkdir -p dist/final

          # CLI binaries
          for dir in dist/mcp-v8-cli-linux-x86_64 dist/mcp-v8-cli-linux-arm64 dist/mcp-v8-cli-macos-arm64; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            cp "$dir/mcp-v8-cli" "dist/final/$name"
          done

          # Server binaries (with embedded CLI)
          for dir in dist/mcp-v8-linux dist/mcp-v8-linux-arm64 dist/mcp-v8-macos-arm64; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            cp "$dir/server" "dist/final/$name"
          done

          # Include openapi.json
          cp mcp-v8-client/openapi.json dist/final/openapi.json

          # Gzip each binary
          for file in dist/final/*; do
            if [ -f "$file" ] && [[ "$file" != *.json ]] && [[ "$file" != *.gz ]]; then
              gzip -c "$file" > "$file.gz"
            fi
          done

          echo "Release assets:"
          ls -lh dist/final/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/final/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
