name: OpenAPI Drift Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  openapi-drift:
    name: Check openapi.json is up to date
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            sandbox = relaxed

      - uses: DeterminateSystems/flake-checker-action@main

      - name: Build server binary
        run: nix develop --command bash -c "cargo build --release -p server"

      - name: Regenerate openapi.json
        run: |
          ./target/release/server --print-openapi > openapi.json
          cp openapi.json mcp-v8-client/openapi.json
          python3 scripts/generate_http_api_reference.py

      - name: Check for drift
        run: |
          if ! git diff --exit-code openapi.json mcp-v8-client/openapi.json site-docs/reference/http-api.md; then
            echo ""
            echo "❌ OpenAPI-derived artifacts are out of date."
            echo ""
            echo "The committed OpenAPI files do not match what the server binary generates."
            echo "Regenerate them with:"
            echo ""
            echo "  cargo build --release -p server"
            echo "  ./target/release/server --print-openapi > openapi.json"
            echo "  cp openapi.json mcp-v8-client/openapi.json"
            echo "  python3 scripts/generate_http_api_reference.py"
            echo ""
            exit 1
          fi
          echo "✅ OpenAPI-derived artifacts are up to date."
