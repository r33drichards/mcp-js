name: Docs Check

on:
  pull_request:
    branches: [ main ]
    paths:
      - "site-docs/**"
      - "mkdocs.yml"
      - "flake.nix"
      - "scripts/generate_http_api_reference.py"
      - "server/src/bin/generate-cli-markdown.rs"
      - "server/src/bin/generate-mcp-tools-markdown.rs"
      - ".github/workflows/deploy-docs.yml"
      - ".github/workflows/docs-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build docs package
        run: nix build .#packages.x86_64-linux.docs --print-build-logs -L
