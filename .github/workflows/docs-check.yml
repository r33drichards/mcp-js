name: Docs Check

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            system-features = nixos-test benchmark big-parallel kvm
            sandbox = false
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build docs package
        run: nix build .#packages.x86_64-linux.docs --print-build-logs -L
      - name: Check generated docs drift
        run: nix build .#checks.x86_64-linux.docs-generated-check --print-build-logs --no-link -L
      - name: Check docs links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml site-docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run docs browser test
        run: nix build .#checks.x86_64-linux.docs-browser-test --print-build-logs --no-link -L
