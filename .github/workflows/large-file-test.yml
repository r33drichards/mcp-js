name: Large File Tests






on:
  workflow_dispatch:
    inputs:
      size_bytes:
        description: "Bytes for the streamed gigabyte test (MCP_FS_LARGE_BYTES)"
        required: false
        default: "1073741824" 
  schedule:
    - cron: "0 5 * * 1" 
  pull_request:
    branches: [main]
    paths:
      - "server/src/engine/fs_store.rs"
      - "server/src/engine/fs_mount.rs"
      - "server/src/engine/fs_chunker.rs"
      - "server/src/engine/fs.rs"
      - "server/tests/fs_large_file.rs"
      - ".github/workflows/large-file-test.yml"

concurrency:
  group: large-file-${{ github.ref }}
  cancel-in-progress: true

jobs:
  large-file:
    name: Large file streaming
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up disk space
        
        
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/flake-checker-action@main

      - name: Build the large-file test
        run: nix develop --command bash -c "cd server && cargo test --no-run --test fs_large_file"

      - name: Run large-file integration tests (incl. the gigabyte test)
        env:
          
          
          MCP_FS_LARGE_BYTES: ${{ github.event.inputs.size_bytes || '1073741824' }}
        run: |
          nix develop --command bash -c "
            cd server &&
            cargo test --test fs_large_file -- --include-ignored --nocapture --test-threads=1
          "

      - name: Disk usage after run
        if: always()
        run: df -h /
